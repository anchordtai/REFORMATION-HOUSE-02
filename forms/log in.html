<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login- Christ's Reformation House International</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="output.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,600,700|Roboto:300,400,500,700" rel="stylesheet" />
    <style>
        .max-h-60 {
            max-height: 15rem;
        }
    </style>
</head>

<body class="bg-gray-100">
    <!-- Header -->
    <header class="p-4 text-white bg-gray-800">
        <div class="container flex items-center justify-between mx-auto">
            <a href="/index.html" class="flex items-center">
                <img class="w-20 h-15" src="assets/img/crhlogo.jpg" alt="logo" />
                <span class="ml-3 text-xl">Christ's Reformation House</span>
            </a>
            <nav class="space-x-4">
                <a href="/forms/contact.html" class="hover:text-gray-300">Contact Us</a>
                <a href="/ministry/AboutUs.html" class="hover:text-gray-300">About Us</a>
                <a href="https://flutterwave.com/pay/anchordtaiwoministries" class="px-4 py-2 bg-red-600 rounded-md hover:bg-red-700">Give Online</a>
            </nav>
            <div class="flex space-x-4">
                <a href="/forms/log in.html">
                    <button class="px-4 py-2 border border-white rounded-md hover:bg-white hover:text-gray-800">Login</button>
                </a>
                <a href="/forms/signup.html">
                    <button class="px-4 py-2 bg-yellow-500 rounded-md hover:bg-yellow-600">Sign-up</button>
                </a>
            </div>
        </div>
    </header>
<body class="flex items-center justify-center h-screen bg-gray-100">
  <div class="w-full max-w-md overflow-hidden bg-white rounded-lg shadow-lg">
    <div class="px-6 py-8">
      <h2 class="mb-8 text-2xl font-bold text-center">Log In</h2>

      <form action="#" method="POST" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="Your email address" class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Password</label>
          <input type="password" id="password" name="password" required placeholder="Your password" class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
        </div>

        <div class="text-center">
          <button type="submit" class="w-full px-4 py-2 text-white transition duration-300 ease-in-out bg-blue-500 rounded-md hover:bg-blue-600">Log In</button>
        </div>
      </form>
    </div>
    <div class="py-4 text-center bg-gray-100">
      <p class="text-sm text-gray-600">Don't have an account? <a href="/forms/signup.html" class="text-blue-500 hover:underline">Sign Up</a></p>
    </div>
  </div>
</body>
</html>
