<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Registration - Destiny Lifting Convention 2024</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
    <!-- Header -->
    <header class="fixed top-0 z-10 w-full p-4 text-white bg-gray-800">
        <div class="container flex items-center justify-between mx-auto">
            <a href="/" class="flex items-center">
                <img class="w-20 h-15" src="../assets/img/crhlogo.jpg" alt="logo" />
                <span class="ml-3 text-xl">Christ's Reformation House</span>
            </a>
            <nav class="space-x-4">
                <a href="forms/contact.html" class="hover:text-gray-300">Contact Us</a>
                <a href="ministry/AboutUs.html" class="hover:text-gray-300">About Us</a>
                <a href="https://flutterwave.com/pay/anchordtaiwoministries" class="px-4 py-2 bg-red-600 rounded-md hover:bg-red-700">Give Online</a>
            </nav>
            <div class="flex space-x-4">
                <a href="forms/log in.html">
                    <button class="px-4 py-2 border border-white rounded-md hover:bg-white hover:text-gray-800">Login</button>
                </a>
                <a href="forms/signup.html">
                    <button class="px-4 py-2 bg-yellow-500 rounded-md hover:bg-yellow-600">Sign-up</button>
                </a>
            </div>
        </div>
    </header>

    <!-- Registration Form Section -->
    <section class="py-12 mt-24 bg-white">
        <div class="container px-6 mx-auto">
            <div class="max-w-lg p-8 mx-auto bg-gray-100 rounded-lg shadow-md">
                <h2 class="mb-6 text-2xl font-bold text-center text-gray-800">Register for Destiny Lifting Convention 2024</h2>
                <form action="#" method="POST" class="space-y-4">
                    <div>
                        <label for="name" class="block text-sm font-medium text-gray-700">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="Your full name" class="w-full mt-1 border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Your email address" class="w-full mt-1 border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                    </div>
                    <div>
                        <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required placeholder="Your phone number" class="w-full mt-1 border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                    </div>
                    <div>
                        <label for="additional-info" class="block text-sm font-medium text-gray-700">Additional Information</label>
                        <textarea id="additional-info" name="additional-info" placeholder="Any additional information" class="w-full mt-1 border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50"></textarea>
                    </div>
                    <div class="text-center">
                        <button type="submit" class="w-full px-4 py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700">Register</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <!-- Footer Section -->
    <footer class="py-6 text-center text-white bg-gray-800">
        <p>&copy; 2024 Christ's Reformation House International Inc. All rights reserved.</p>
        <div class="mt-4">
            <a href="https://web.facebook.com/profile.php?id=100069245150281" target="_blank" class="mx-2 text-2xl"><i class="fab fa-facebook-f"></i></a>
            <a href="https://www.twitter.com/yourchurch" target="_blank" class="mx-2 text-2xl"><i class="fab fa-twitter"></i></a>
            <a href="https://www.instagram.com/apostletaiwoanchord" target="_blank" class="mx-2 text-2xl"><i class="fab fa-instagram"></i></a>
            <a href="https://www.youtube.com/channel/UCgZv2cTsQy1IKHJqk2zQj7Q" target="_blank" class="mx-2 text-2xl"><i class="fab fa-youtube"></i></a>
            <a href="https://wa.me/2348138463804" target="_blank" class="mx-2 text-2xl"><i class="fab fa-whatsapp"></i></a>
        </div>
    </footer>

</body>
</html>
