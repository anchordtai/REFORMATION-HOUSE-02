<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donate - Christ's Reformation House International</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,300i,400,400i,600,600i,700,700i|Roboto:300,300i,400,400i,500,500i,600,600i,700,700i" rel="stylesheet" />
</head>
<body class="bg-gray-100">
    <header class="p-4 text-white bg-gray-800">
        <div class="container flex items-center justify-between mx-auto">
            <a href="index.html" class="flex items-center">
                <img class="w-20 mb-2 h-13" src="../assets/img/crhlogo.jpg" alt="logo" />
                <span class="ml-3 text-xl">Christ's Reformation House</span>
            </a>
            <nav class="space-x-4">
                <a href="forms/contact.html" class="text-white hover:text-gray-300">Contact Us</a>
                <a href="ministry/AboutUs.html" class="text-white hover:text-gray-300">About Us</a>
               
            </nav>
        </div>
    </header>

    <main class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-lg p-8 bg-white rounded-lg shadow-lg">
            <h2 class="mb-6 text-2xl font-bold text-center">Donate to Christ's Reformation House</h2>
            <form id="donation-form" class="space-y-4">
                <div>
                    <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
                    <input type="text" id="name" name="name" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" name="email" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                </div>
                <div>
                    <label for="country" class="block text-sm font-medium text-gray-700">Country</label>
                    <input type="text" id="country" name="country" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                </div>
                <div>
                    <label for="state" class="block text-sm font-medium text-gray-700">State</label>
                    <input type="text" id="state" name="state" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                </div>
                <div>
                    <label for="address" class="block text-sm font-medium text-gray-700">Address</label>
                    <input type="text" id="address" name="address" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                </div>
                <div>
                    <label for="donationType" class="block text-sm font-medium text-gray-700">Type of Donation</label>
                    <select id="donationType" name="donationType" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                        <option value="Tithe">Tithe</option>
                        <option value="Offering">Offering</option>
                        <option value="Evangelism">Evangelism</option>
                        <option value="Building">Building</option>
                        <option value="Mission">Mission</option>
                    </select>
                </div>
                <div>
                    <label for="amount" class="block text-sm font-medium text-gray-700">Amount</label>
                    <input type="number" id="amount" name="amount" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                </div>
                <div>
                    <label for="currency" class="block text-sm font-medium text-gray-700">Currency</label>
                    <select id="currency" name="currency" required class="w-full border-gray-300 rounded-md shadow-sm focus:border-blue-500 focus:ring focus:ring-blue-500 focus:ring-opacity-50">
                        <option value="USD">USD</option>
                        <option value="NGN">NGN</option>
                        <option value="EUR">EUR</option>
                        <!-- Add more currencies as needed -->
                    </select>
                </div>
                <div class="text-center">
                    <button type="button" onclick="makeDonation()" class="px-6 py-3 text-white bg-blue-600 rounded-md hover:bg-blue-700">Submit</button>
                </div>
            </form>
        </div>
    </main>

    <footer class="p-4 text-center text-white bg-gray-800">
        <p>&copy; 2024 Christ's Reformation House International. All rights reserved.</p>
    </footer>

    <script src="https://checkout.flutterwave.com/v3.js"></script>
    <script>
        function makeDonation() {
            var name = document.getElementById('name').value;
            var email = document.getElementById('email').value;
            var amount = document.getElementById('amount').value;
            var currency = document.getElementById('currency').value;
            var country = document.getElementById('country').value;
            var state = document.getElementById('state').value;
            var address = document.getElementById('address').value;
            var donationType = document.getElementById('donationType').value;

            console.log("Name:", name);
            console.log("Email:", email);
            console.log("Amount:", amount);
            console.log("Currency:", currency);
            console.log("Country:", country);
            console.log("State:", state);
            console.log("Address:", address);
            console.log("Donation Type:", donationType);

            FlutterwaveCheckout({
                public_key: "YOUR_PUBLIC_KEY_HERE",
                tx_ref: "REF_" + Math.floor((Math.random() * 1000000000) + 1),
                amount: amount,
                currency: currency,
                payment_options: "card, mobilemoneyghana, ussd",
                redirect_url: "https://your-website.com/payment-success",
                meta: {
                    consumer_id: email,
                    consumer_mac: name,
                    country: country,
                    state: state,
                    address: address,
                    donation_type: donationType
                },
                customer: {
                    email: email,
                    phone_number: "08102909304",
                    name: name
                },
                customizations: {
                    title: "Christ's Reformation House Donation",
                    description: `Support our ministry (${donationType})`,
                    logo: "https://your-website.com/logo.png"
                }
            });
        }
    </script>
</body>
</html>
